services:
  asr:
    build:
      context: .
      dockerfile: asr/Dockerfile
      args:
        BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim-bookworm}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-http://mirrors.ustc.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.ustc.edu.cn/debian-security}
        AX_ASR_REPO: ${AX_ASR_REPO:-https://github.com/AXERA-TECH/ax_asr_api.git}
    restart: unless-stopped
    privileged: true
    ports:
      - "10300:10300"
    volumes:
      - /dev:/dev
      - /soc:/soc:ro
      - ./models/asr:/models/asr:ro
    environment:
      AX_ASR_MODEL_PATH: /models/asr
      AX_ASR_MODEL: sensevoice
      AX_ASR_LANGUAGE: auto
      AX_ASR_HTTP_URL: http://127.0.0.1:8080
      AX_ASR_SERVER_PORT: "8080"
      AX_ASR_ADAPTER_URI: tcp://0.0.0.0:10300
      AX_ASR_BUILD_IF_MISSING: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import socket
          s = socket.create_connection(("127.0.0.1", 10300), 2)
          s.close()
          PY
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  tts:
    build:
      context: .
      dockerfile: tts/Dockerfile
      args:
        BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim-bookworm}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-http://mirrors.ustc.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.ustc.edu.cn/debian-security}
        AX_TTS_REPO: ${AX_TTS_REPO:-https://github.com/AXERA-TECH/ax_tts_api.git}
    restart: unless-stopped
    privileged: true
    ports:
      - "10200:10200"
    volumes:
      - /dev:/dev
      - /soc:/soc:ro
      - ./models/tts:/models/tts:ro
    environment:
      AX_TTS_MODEL_PATH: /models/tts
      AX_TTS_MODEL: kokoro
      AX_TTS_LANGUAGE: zh
      AX_TTS_VOICE: jm_kumo
      AX_TTS_HTTP_URL: http://127.0.0.1:8081
      AX_TTS_SERVER_PORT: "8081"
      AX_TTS_ADAPTER_URI: tcp://0.0.0.0:10200
      AX_TTS_BUILD_IF_MISSING: "1"
      AX_TTS_ESPEAK_DATA_PATH: /opt/ax_tts_api/espeak-ng-data
      AX_TTS_JIEBA_DICT_PATH: /opt/ax_tts_api/dict
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import socket
          s = socket.create_connection(("127.0.0.1", 10200), 2)
          s.close()
          PY
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  openwakeword:
    image: rhasspy/wyoming-openwakeword
    restart: unless-stopped
    ports:
      - "10400:10400"
    command:
      - --uri
      - tcp://0.0.0.0:10400
      - --preload-model
      - ok_nabu

  llm:
    build:
      context: .
      dockerfile: llm/Dockerfile
    restart: unless-stopped
    privileged: true
    ports:
      - "8001:8001"
    volumes:
      - /dev:/dev
      - ./models/llm:/models/llm:ro
    environment:
      AX_LLM_MODEL_DIR: /models/llm/Qwen3-0.6B
      AX_LLM_PORT: "8001"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8001/health >/dev/null || curl -fsS http://127.0.0.1:8001/v1/models >/dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    profiles: [homeassistant]
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - ./homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    depends_on:
      - asr
      - tts
      - openwakeword
      - llm
